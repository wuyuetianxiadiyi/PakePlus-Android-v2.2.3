<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办清单</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{padding:20px;font-family:微软雅黑;background:#f5f5f5;}
        .top{display:flex;gap:10px;margin-bottom:20px;}
        #inputBox{flex:1;padding:12px;border:1px solid #ccc;border-radius:6px;font-size:16px;}
        #addBtn{padding:12px 20px;background:#2196F3;color:white;border:none;border-radius:6px;}
        .item{display:flex;justify-content:space-between;align-items:center;background:white;padding:12px;border-radius:6px;margin-bottom:10px;}
        .delBtn{background:#f44336;color:white;border:none;padding:6px 12px;border-radius:4px;}
    </style>
</head>
<body>
    <div class="top">
        <input type="text" id="inputBox" placeholder="输入新待办事项...">
        <button id="addBtn" onclick="addTask()">添加</button>
    </div>
    <div id="list"></div>

    <script>
        // 页面加载自动读取本地存储
        window.onload = loadTasks;

        // 添加待办
        function addTask(){
            let val = document.getElementById('inputBox').value.trim();
            if(!val) return;

            let tasks = JSON.parse(localStorage.getItem('todo_list')) || [];
            tasks.push(val);
            localStorage.setItem('todo_list', JSON.stringify(tasks));

            document.getElementById('inputBox').value = '';
            loadTasks();
        }

        // 渲染列表
        function loadTasks(){
            let listDom = document.getElementById('list');
            listDom.innerHTML = '';
            let tasks = JSON.parse(localStorage.getItem('todo_list')) || [];

            tasks.forEach((item, idx)=>{
                let div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span>${item}</span>
                    <button class="delBtn" onclick="delTask(${idx})">删除</button>
                `;
                listDom.appendChild(div);
            })
        }

        // 删除待办
        function delTask(idx){
            let tasks = JSON.parse(localStorage.getItem('todo_list')) || [];
            tasks.splice(idx,1);
            localStorage.setItem('todo_list', JSON.stringify(tasks));
            loadTasks();
        }
    </script>
</body>
</html>
